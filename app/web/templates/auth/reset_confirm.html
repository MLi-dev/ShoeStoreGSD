{% extends "base.html" %}
{% block title %}Set New Password — ShoeStore{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-4">
    <h2 class="mb-4">Set New Password</h2>
    {% if error %}
    <div class="alert alert-danger" role="alert">{{ error }}</div>
    {% endif %}
    <form method="post" action="/auth/reset-confirm">
      <div class="mb-3">
        <label for="token" class="form-label">Reset Token</label>
        <input type="text" class="form-control" id="token" name="token"
               value="{{ prefill_token or '' }}" required>
      </div>
      <div class="mb-3">
        <label for="new_password" class="form-label">New Password</label>
        <input type="password" class="form-control" id="new_password" name="new_password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100 btn-lg">Set New Password</button>
    </form>
    <p class="mt-3 text-center">
      <a href="/login">Back to Sign In</a>
    </p>
  </div>
</div>
{% endblock %}
